<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SR Speech Boost Player</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --border: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .select,
    .stream-url {
      display: block;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.95rem;
    }

    audio {
      width: 100%;
      margin: 8px 0 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: #082f49;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status strong.on { color: var(--accent-2); }
    .status strong.off { color: #fda4af; }

    .small {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SR Speech Boost Player</h1>
    <p>
      Simple web player with channel selection, direct MP3 stream support, and toggleable speech enhancement.
    </p>

    <div class="grid">
      <div>
        <label for="channelSelect" class="field-label">Kanal</label>
        <select id="channelSelect" class="select" aria-label="Choose SR channel">
          <option value="https://edge1.sr.se/p1-aac-320">P1</option>
          <option value="https://edge1.sr.se/p2-aac-320">P2</option>
          <option value="https://edge1.sr.se/p3-aac-320">P3</option>
          <option value="https://bauernordic-pods.sharp-stream.com/1573/svenska_fall_final_c18ce6e5_normal.mp3?aw_0_1st.episodeid=253871&aw_0_1st.collectionid=1573">Test Podd (23:50 min in)</option>
        </select>
      </div>
      <div>
        <label for="strengthSelect" class="field-label">Speech boost</label>
        <select id="strengthSelect" class="select" aria-label="Speech boost strength">
          <option value="low">Låg</option>
          <option value="medium" selected>Mellan</option>
          <option value="high">Stark</option>
        </select>
      </div>
    </div>
<audio id="player" controls crossorigin="anonymous"></audio>

    <div class="controls">
      <button id="loadBtn" class="secondary">Ladda ström</button>
      <button id="speechBtn" class="primary">Aktivera speech boost</button>
      <button id="testBtn" class="secondary">Testa effekt</button>
    </div>

    <div class="status" id="status">
      Speech enhancement: <strong class="off">OFF</strong><br />
      Ready to play.
    </div>

    <div class="small">
      Stöder direkta MP3-ljudströmmar. Speech boost kräver också att strömmen tillåter Web Audio/CORS.
    </div>
  </main>

    <script>
    const audio = document.getElementById('player');
    const speechBtn = document.getElementById('speechBtn');
    const statusEl = document.getElementById('status');
    const loadBtn = document.getElementById('loadBtn');
    const channelSelect = document.getElementById('channelSelect');
    const strengthSelect = document.getElementById('strengthSelect');
    const testBtn = document.getElementById('testBtn');

    let audioContext;
    let sourceNode;
    let dryGain;
    let wetGain;
    let highpass;
    let mudCut;
    let presenceBoost;
    let compressor;
    let initialized = false;
    let speechEnabled = false;
    let speechStrength = 'medium';
    let isTestingEffect = false;

    function setStatus(message, enabled) {
      statusEl.innerHTML = `Speech enhancement: <strong class="${enabled ? 'on' : 'off'}">${enabled ? 'ON' : 'OFF'}</strong><br />${message}`;
    }

    function applySpeechPreset() {
      if (!initialized) return;

      if (speechStrength === 'low') {
        highpass.frequency.value = 160;
        mudCut.frequency.value = 280;
        mudCut.Q.value = 1.0;
        mudCut.gain.value = -3.0;
        presenceBoost.frequency.value = 2600;
        presenceBoost.Q.value = 1.4;
        presenceBoost.gain.value = 4.5;
        compressor.threshold.value = -26;
        compressor.knee.value = 20;
        compressor.ratio.value = 3;
        compressor.attack.value = 0.003;
        compressor.release.value = 0.20;
      } else if (speechStrength === 'high') {
        highpass.frequency.value = 220;
        mudCut.frequency.value = 320;
        mudCut.Q.value = 1.2;
        mudCut.gain.value = -6.0;
        presenceBoost.frequency.value = 3200;
        presenceBoost.Q.value = 1.8;
        presenceBoost.gain.value = 9.0;
        compressor.threshold.value = -34;
        compressor.knee.value = 28;
        compressor.ratio.value = 6;
        compressor.attack.value = 0.002;
        compressor.release.value = 0.30;
      } else {
        highpass.frequency.value = 180;
        mudCut.frequency.value = 300;
        mudCut.Q.value = 1.1;
        mudCut.gain.value = -4.5;
        presenceBoost.frequency.value = 2900;
        presenceBoost.Q.value = 1.6;
        presenceBoost.gain.value = 6.5;
        compressor.threshold.value = -30;
        compressor.knee.value = 24;
        compressor.ratio.value = 4;
        compressor.attack.value = 0.0025;
        compressor.release.value = 0.24;
      }
    }

    async function ensureAudioGraph() {
      if (initialized) {
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        return;
      }

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioContext.createMediaElementSource(audio);

      dryGain = audioContext.createGain();
      wetGain = audioContext.createGain();

      highpass = audioContext.createBiquadFilter();
      highpass.type = 'highpass';

      mudCut = audioContext.createBiquadFilter();
      mudCut.type = 'peaking';

      presenceBoost = audioContext.createBiquadFilter();
      presenceBoost.type = 'peaking';

      compressor = audioContext.createDynamicsCompressor();

      sourceNode.connect(dryGain);
      dryGain.connect(audioContext.destination);

      sourceNode.connect(highpass);
      highpass.connect(mudCut);
      mudCut.connect(presenceBoost);
      presenceBoost.connect(compressor);
      compressor.connect(wetGain);
      wetGain.connect(audioContext.destination);

      initialized = true;
      applySpeechPreset();
      applySpeechState();

      if (audioContext.state === 'suspended') {
        await audioContext.resume();
      }
    }

    function applySpeechState() {
      if (!initialized) return;

      dryGain.gain.value = speechEnabled ? 0 : 1;
      wetGain.gain.value = speechEnabled ? 1.1 : 0;

      const labels = { low: 'låg', medium: 'mellan', high: 'stark' };
      const message = speechEnabled
        ? `Speech boost är aktiv med ${labels[speechStrength]} filtrering och lätt kompression.`
        : 'Original audio is playing without enhancement.';

      setStatus(message, speechEnabled);
      speechBtn.textContent = speechEnabled ? 'Stäng av speech boost' : 'Aktivera speech boost';
    }

    function looksLikeDirectAudioStream(url) {
      return /mp3|mpeg|audio/i.test(url);
    }

    async function loadStream(url) {
      audio.pause();
      audio.src = url;
      audio.load();
      await ensureAudioGraph();
    }

    channelSelect.addEventListener('change', () => {
      // kanal väljs här; laddas när användaren trycker på knappen
    });

    strengthSelect.addEventListener('change', async () => {
      speechStrength = strengthSelect.value;
      try {
        await ensureAudioGraph();
        applySpeechPreset();
        applySpeechState();
      } catch (error) {
        console.error(error);
      }
    });

    loadBtn.addEventListener('click', async () => {
      const url = channelSelect.value.trim();

      try {
        await loadStream(url);
        const selectedName = channelSelect.options[channelSelect.selectedIndex]?.text || 'vald kanal';
        const streamType = looksLikeDirectAudioStream(url) ? 'MP3-direktström' : 'ström';
        setStatus(`Ström laddad från ${selectedName} (${streamType}). Tryck på play för att lyssna.`, speechEnabled);
      } catch (error) {
        console.error(error);
        setStatus('Kunde inte ladda strömmen eller initiera ljudbehandling.', false);
      }
    });

    speechBtn.addEventListener('click', async () => {
      try {
        await ensureAudioGraph();
        speechEnabled = !speechEnabled;
        applySpeechState();
      } catch (error) {
        console.error(error);
        setStatus('Speech enhancement could not be enabled. The stream may not allow cross-origin audio processing.', false);
      }
    });

    testBtn.addEventListener('click', async () => {
      try {
        await ensureAudioGraph();
        isTestingEffect = true;
        speechEnabled = false;
        applySpeechState();
        setStatus('Testläge: original i 2 sekunder, sedan speech boost i 2 sekunder.', false);

        setTimeout(() => {
          speechEnabled = true;
          applySpeechState();
        }, 2000);

        setTimeout(() => {
          speechEnabled = false;
          applySpeechState();
          isTestingEffect = false;
          setStatus('Test klart. Jämför nu manuellt med knappen för speech boost.', false);
        }, 4000);
      } catch (error) {
        console.error(error);
      }
    });

    audio.addEventListener('play', async () => {
      try {
        await ensureAudioGraph();
      } catch (error) {
        console.error(error);
      }
    });

    streamUrlInput.value = channelSelect.value;
  </script>
</body>
</html>
