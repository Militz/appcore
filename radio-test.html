<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SR Speech Boost Player</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --border: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .select {
      display: block;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.95rem;
    }

    audio {
      width: 100%;
      margin: 8px 0 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #082f49;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status strong.on { color: var(--accent-2); }
    .status strong.off { color: #fda4af; }

    .small {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SR Speech Boost Player</h1>
    <p>
      Enkel webbspelare för att testa speech boost på olika ljudströmmar.
    </p>

    <div class="grid">
      <div>
        <label for="channelSelect" class="field-label">Ljud</label>
        <select id="channelSelect" class="select" aria-label="Välj ljud">
          <option value="" selected disabled>Välj ljud</option>
          <option value="https://edge1.sr.se/p1-aac-320">P1</option>
          <option value="https://edge1.sr.se/p2-aac-320">P2</option>
          <option value="https://edge1.sr.se/p3-aac-320">P3</option>
          <option value="https://bauernordic-pods.sharp-stream.com/1573/svenska_fall_final_c18ce6e5_normal.mp3?aw_0_1st.episodeid=253871&aw_0_1st.collectionid=1573">Test Podd</option>
        </select>
      </div>

      <div>
        <label for="strengthSelect" class="field-label">Speech boost</label>
        <select id="strengthSelect" class="select" aria-label="Speech boost strength">
          <option value="low">Låg</option>
          <option value="medium" selected>Mellan</option>
          <option value="high">Stark</option>
        </select>
      </div>
    </div>

    <audio id="player" controls crossorigin="anonymous"></audio>

    <div class="controls">
      <button id="testBtn" class="primary" disabled>Testa speech boost</button>
    </div>

    <div class="status" id="status">
      Speech enhancement: <strong class="off">OFF</strong><br />
      Välj ljud för att börja.
    </div>

    <div class="small">
      Speech boost kräver att ljudströmmen tillåter Web Audio/CORS.
    </div>
  </main>

  <script>
    const audio = document.getElementById('player');
    const statusEl = document.getElementById('status');
    const channelSelect = document.getElementById('channelSelect');
    const strengthSelect = document.getElementById('strengthSelect');
    const testBtn = document.getElementById('testBtn');

    let audioContext;
    let sourceNode;
    let dryGain;
    let wetGain;
    let highpass;
    let mudCut;
    let presenceBoost;
    let compressor;
    let initialized = false;
    let speechEnabled = false;
    let speechStrength = 'medium';
    let isTestingEffect = false;
    let testTimeouts = [];

    function setStatus(message, enabled) {
      statusEl.innerHTML = `Speech enhancement: <strong class="${enabled ? 'on' : 'off'}">${enabled ? 'ON' : 'OFF'}</strong><br />${message}`;
    }

    function clearTestTimeouts() {
      testTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
      testTimeouts = [];
      isTestingEffect = false;
    }

    function applySpeechPreset() {
      if (!initialized) return;

      if (speechStrength === 'low') {
        highpass.frequency.value = 160;
        mudCut.frequency.value = 280;
        mudCut.Q.value = 1.0;
        mudCut.gain.value = -3.0;
        presenceBoost.frequency.value = 2600;
        presenceBoost.Q.value = 1.4;
        presenceBoost.gain.value = 4.5;
        compressor.threshold.value = -26;
        compressor.knee.value = 20;
        compressor.ratio.value = 3;
        compressor.attack.value = 0.003;
        compressor.release.value = 0.20;
      } else if (speechStrength === 'high') {
        highpass.frequency.value = 220;
        mudCut.frequency.value = 320;
        mudCut.Q.value = 1.2;
        mudCut.gain.value = -6.0;
        presenceBoost.frequency.value = 3200;
        presenceBoost.Q.value = 1.8;
        presenceBoost.gain.value = 9.0;
        compressor.threshold.value = -34;
        compressor.knee.value = 28;
        compressor.ratio.value = 6;
        compressor.attack.value = 0.002;
        compressor.release.value = 0.30;
      } else {
        highpass.frequency.value = 180;
        mudCut.frequency.value = 300;
        mudCut.Q.value = 1.1;
        mudCut.gain.value = -4.5;
        presenceBoost.frequency.value = 2900;
        presenceBoost.Q.value = 1.6;
        presenceBoost.gain.value = 6.5;
        compressor.threshold.value = -30;
        compressor.knee.value = 24;
        compressor.ratio.value = 4;
        compressor.attack.value = 0.0025;
        compressor.release.value = 0.24;
      }
    }

    async function ensureAudioGraph() {
      if (initialized) {
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        return;
      }

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioContext.createMediaElementSource(audio);

      dryGain = audioContext.createGain();
      wetGain = audioContext.createGain();

      highpass = audioContext.createBiquadFilter();
      highpass.type = 'highpass';

      mudCut = audioContext.createBiquadFilter();
      mudCut.type = 'peaking';

      presenceBoost = audioContext.createBiquadFilter();
      presenceBoost.type = 'peaking';

      compressor = audioContext.createDynamicsCompressor();

      sourceNode.connect(dryGain);
      dryGain.connect(audioContext.destination);

      sourceNode.connect(highpass);
      highpass.connect(mudCut);
      mudCut.connect(presenceBoost);
      presenceBoost.connect(compressor);
      compressor.connect(wetGain);
      wetGain.connect(audioContext.destination);

      initialized = true;
      applySpeechPreset();
      applySpeechState();

      if (audioContext.state === 'suspended') {
        await audioContext.resume();
      }
    }

    function applySpeechState(customMessage) {
      if (!initialized) return;

      dryGain.gain.value = speechEnabled ? 0 : 1;
      wetGain.gain.value = speechEnabled ? 1.1 : 0;

      const labels = { low: 'låg', medium: 'mellan', high: 'stark' };
      const defaultMessage = speechEnabled
        ? `Speech boost är aktiv med ${labels[speechStrength]} filtrering och lätt kompression.`
        : 'Original audio spelas utan enhancement.';

      setStatus(customMessage || defaultMessage, speechEnabled);
    }

    async function loadStream(url) {
      clearTestTimeouts();

      audio.pause();
      audio.src = url;
      audio.load();

      speechEnabled = false;

      await ensureAudioGraph();
      applySpeechState();

      testBtn.disabled = false;
    }

    channelSelect.addEventListener('change', async () => {
      const url = channelSelect.value;
      const selectedName = channelSelect.options[channelSelect.selectedIndex]?.text || 'valt ljud';

      if (!url) return;

      try {
        await loadStream(url);
        setStatus(`${selectedName} är laddad. Tryck på play och sedan "Testa speech boost".`, false);
      } catch (error) {
        console.error(error);
        testBtn.disabled = true;
        setStatus('Kunde inte ladda ljudet eller initiera ljudbehandling.', false);
      }
    });

    strengthSelect.addEventListener('change', async () => {
      speechStrength = strengthSelect.value;

      try {
        await ensureAudioGraph();
        applySpeechPreset();
        applySpeechState();
      } catch (error) {
        console.error(error);
      }
    });

    testBtn.addEventListener('click', async () => {
      try {
        await ensureAudioGraph();

        clearTestTimeouts();

        isTestingEffect = true;
        testBtn.disabled = true;

        const stepDuration = 5000;
        const repetitions = 3;
        const totalSteps = repetitions * 2;

        for (let step = 0; step < totalSteps; step++) {
          const timeoutId = setTimeout(() => {
            const isSpeechStep = step % 2 === 1;
            const round = Math.floor(step / 2) + 1;

            speechEnabled = isSpeechStep;

            const mode = isSpeechStep ? 'speech boost' : 'original';
            const message = `Test ${round} av ${repetitions}: ${mode} i ${stepDuration/1000} sekunder.`;

            applySpeechState(message);
          }, step * stepDuration);

          testTimeouts.push(timeoutId);
        }

        const doneTimeoutId = setTimeout(() => {
          speechEnabled = false;
          applySpeechState('Test klart. Speech boost är avstängd igen.');
          isTestingEffect = false;
          testBtn.disabled = false;
        }, totalSteps * stepDuration);

        testTimeouts.push(doneTimeoutId);

      } catch (error) {
        console.error(error);
        testBtn.disabled = false;
        setStatus('Kunde inte testa speech boost. Strömmen kanske inte tillåter Web Audio/CORS.', false);
      }
    });

    audio.addEventListener('play', async () => {
      try {
        await ensureAudioGraph();
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
